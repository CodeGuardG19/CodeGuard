# nginx.conf — CodeGuard reverse proxy
#
# Security model:
#   - This EC2 instance is the ONLY public entry point for GitHub webhooks.
#   - The Lambda Function URL (LAMBDA_FUNCTION_URL_PLACEHOLDER) is not
#     publicly routable — it is only reachable from within the VPC.
#   - All other paths return 404. No other services are exposed.
#   - TLS is handled by Certbot (Let's Encrypt). Run:
#       sudo certbot --nginx -d your.domain.com
#     after EC2 is provisioned to obtain and auto-renew the certificate.

# Rate limiting: max 20 requests/second per IP to protect Lambda from abuse
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=20r/s;

server {
    listen 443 ssl;
    server_name _;

    # TLS certificates managed by Certbot — paths populated after certbot runs
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # GitHub webhook payload max size (GitHub caps at ~25 MB)
    client_max_body_size 26m;

    # Access and error logs — picked up by CloudWatch agent
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    # Only POST /webhook is accepted; everything else returns 404
    location = /webhook {
        limit_except POST { deny all; }
        limit_req zone=webhook_limit burst=5 nodelay;

        # Forward to Lambda Function URL (reachable only within VPC)
        proxy_pass LAMBDA_FUNCTION_URL_PLACEHOLDER;

        # Preserve all headers so Lambda can validate X-Hub-Signature-256
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass GitHub signature header through unchanged
        proxy_pass_request_headers on;

        # Lambda Function URL timeout slightly under Lambda's 30s timeout
        proxy_read_timeout    28s;
        proxy_connect_timeout  5s;
        proxy_send_timeout    10s;
    }

    # Let's Encrypt ACME challenge (needed for cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other paths
    location / {
        return 404;
    }
}

# Redirect HTTP to HTTPS (after Certbot adds the redirect block it will
# replace this with its managed version)
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
